[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "semipy"
version = "0.1.0"
description = "Runtime semiformal system: @semiformal and semi() for semantically underspecified logic"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "dotenv>=0.9.9",
    "ipykernel>=7.2.0",
    "openai>=1.0",
    "rich>=14.3.2",
]

[project.optional-dependencies]
dev = ["pytest", "python-dotenv"]

[tool.setuptools.packages.find]
where = ["."]
include = ["semipy*"]
